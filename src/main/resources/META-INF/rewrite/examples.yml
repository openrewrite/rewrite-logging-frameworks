type: specs.openrewrite.org/v1beta/example
recipeName: org.openrewrite.java.logging.log4j.JulToLog4j
examples:
- description: '`JulToLog4jTest#simpleLoggerCalls`'
  sources:
  - before: |
      import java.util.logging.Level;
      import java.util.logging.Logger;

      class Test {
          void method(Logger logger) {
              logger.config("Hello");
              logger.config(() -> "Hello");
              logger.fine("Hello");
              logger.fine(() -> "Hello");
              logger.finer("Hello");
              logger.finer(() -> "Hello");
              logger.finest("Hello");
              logger.finest(() -> "Hello");
              logger.info("Hello");
              logger.info(() -> "Hello");
              logger.severe("Hello");
              logger.severe(() -> "Hello");
              logger.warning("Hello");
              logger.warning(() -> "Hello");

              logger.log(Level.INFO, "Hello");
              logger.log(Level.INFO, () -> "Hello");
          }
      }
    after: |
      import org.apache.logging.log4j.Logger;

      class Test {
          void method(Logger logger) {
              logger.info("Hello");
              logger.info(() -> "Hello");
              logger.debug("Hello");
              logger.debug(() -> "Hello");
              logger.trace("Hello");
              logger.trace(() -> "Hello");
              logger.trace("Hello");
              logger.trace(() -> "Hello");
              logger.info("Hello");
              logger.info(() -> "Hello");
              logger.error("Hello");
              logger.error(() -> "Hello");
              logger.warn("Hello");
              logger.warn(() -> "Hello");

              logger.info("Hello");
              logger.info(() -> "Hello");
          }
      }
    language: java
